# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
 ""Our solution is a multi-stage hybrid ranking pipeline designed strictly for the <5-minute
 CPU constraint, utilizing zero external APIs or LLMs. We begin with a streaming filter to 
 instantly drop honeypots and disqualified profiles. Next, a query-scoped BM25 algorithm 
 retrieves the top 2,000 relevant candidates. For these, we engineer 8 core features—including a 
 mathematical 'Trust Multiplier' that heavily discounts unendorsed, zero-duration skills. We then 
 use these baseline features as pseudo-labels to dynamically train a LightGBM (LambdaRank) model on the fly, 
 optimizing for non-linear candidate fit. To ensure real-world hiring availability, the ML score is multiplicatively 
 gated by a behavioral modifier, severely penalizing candidates with low platform activity or response rates. 
 Ties are broken deterministically via candidate ID. Finally, we generate the reasoning strings using a mathematically 
 seeded structural branching engine. This guarantees highly varied, grammatically sound, and 100% hallucination-free 
 explanations using only verified JSON facts.""

